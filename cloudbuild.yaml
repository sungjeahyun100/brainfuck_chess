steps:
  # Step 1: Build the Docker image from the project root
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_IMAGE_NAME:$COMMIT_SHA'
      - '-t'
      - '$_IMAGE_NAME:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push both tags to the registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_NAME:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_IMAGE_NAME:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_IMAGE_NAME:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      # Rooms are currently held in server memory. Keep Cloud Run on one
      # instance so create/find/join requests see the same room store.
      - '--max-instances'
      - '1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'APP_ENV=$_APP_ENV'

substitutions:
  # Override these in the Cloud Build trigger settings
  _IMAGE_NAME: 'gcr.io/$PROJECT_ID/brainfuck-chess-server'
  _SERVICE_NAME: 'brainfuck-chess-server'
  _REGION: 'us-central1'
  _APP_ENV: 'prod'

images:
  - '$_IMAGE_NAME:$COMMIT_SHA'
  - '$_IMAGE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
